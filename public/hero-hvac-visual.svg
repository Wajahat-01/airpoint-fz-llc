    <path d="M760 300 H1180 V420 H760 Z" opacity="0.7"/>
    <path d="M1180 300 H1520 V360 H1180 Z"/>
    <path d="M1180 360 H1520 V420 H1180 Z"/>
    <circle cx="1360" cy="510" r="90"/>
    <circle cx="1360" cy="510" r="55" stroke-opacity="0.2"/>
    <path d="M1360 420 V600 M1270 510 H1450" stroke-opacity="0.2"/>
  </g>

  <g fill="#00e5ff" fill-opacity="0.08">
    <circle cx="400" cy="340" r="6"/>
    <circle cx="520" cy="260" r="4"/>
    <circle cx="1320" cy="510" r="8"/>
    <circle cx="1480" cy="360" r="5"/>
    <circle cx="900" cy="360" r="5"/>
